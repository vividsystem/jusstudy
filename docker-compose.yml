services:
  frontend-dev:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:5173"
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development
    networks:
      - public
    depends_on:
      - backend-dev

  backend-dev:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports: 
      - "3000:3000"
    networks:
      - public
      - backend
      - observability
    depends_on:
      - db-dev

  db-dev:
    image: postgres:16
    volumes:
      - jusstudy_postgres_data:/var/lib/postgresql/data
    env_file: ".env"
    networks:
      - backend
    ports:
      - "5432:5432"

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
  prometheus:
    image: prom/prometheus:v2.47.0
    command:
      - --web.enable-remote-write-receiver
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  grafana:
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy
          orgId: 1
          url: http://loki:3100
          basicAuth: false
          isDefault: false
          version: 1
          editable: false
        - name: Prometheus
          type: prometheus
          orgId: 1
          url: http://prometheus:9090
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        EOF
        /run.sh
    image: grafana/grafana:11.0.0
    ports:
      - "3001:3000"
networks:
  observability:
    driver: bridge
  public:
  backend:
volumes:
  jusstudy_postgres_data:
  loki-data:
  grafana-data:
